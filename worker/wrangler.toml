# DealClaw DeepSeek API Proxy
# Cloudflare Worker configuration
#
# Setup:
#   1. npm install -g wrangler
#   2. wrangler login
#   3. wrangler secret put DEEPSEEK_API_KEY   (paste your key when prompted)
#   4. wrangler deploy
#
# The DEEPSEEK_API_KEY must be set as a secret, NOT in this file.

name = "dealclaw-proxy"
main = "deepseek-proxy.js"
compatibility_date = "2024-12-01"

# Workers routes - update "account_id" with your Cloudflare account ID
# account_id = "YOUR_CLOUDFLARE_ACCOUNT_ID"

[observability]
enabled = true
